<button id="theme-toggle" class="btn-reset" aria-label="Toggle dark/light mode" title="Toggle dark/light mode">
  <svg id="theme-icon-dark" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none" aria-hidden="true">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
  </svg>
  <svg id="theme-icon-light" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="12" r="5"></circle>
    <line x1="12" y1="1" x2="12" y2="3"></line>
    <line x1="12" y1="21" x2="12" y2="23"></line>
    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
    <line x1="1" y1="12" x2="3" y2="12"></line>
    <line x1="21" y1="12" x2="23" y2="12"></line>
    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
  </svg>
</button>

<script>
  (function() {
    var darkSheet = document.getElementById('jtd-dark-stylesheet');
    var iconDark = document.getElementById('theme-icon-dark');
    var iconLight = document.getElementById('theme-icon-light');

    function applyTheme(dark) {
      darkSheet.disabled = !dark;
      iconDark.style.display = dark ? 'block' : 'none';
      iconLight.style.display = dark ? 'none' : 'block';
    }

    var saved = localStorage.getItem('jtd-theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(saved === 'dark' || (saved === null && prefersDark));

    document.getElementById('theme-toggle').addEventListener('click', function() {
      var isDark = !darkSheet.disabled;
      applyTheme(!isDark);
      localStorage.setItem('jtd-theme', isDark ? 'light' : 'dark');
    });
  })();
</script>

<style>
  #theme-toggle {
    display: flex;
    align-items: center;
    padding: 0.4rem;
    margin-left: 0.5rem;
    color: inherit;
    cursor: pointer;
    opacity: 0.7;
    border-radius: 4px;
  }
  #theme-toggle:hover { opacity: 1; }
  #main-header { align-items: center; }
</style>
